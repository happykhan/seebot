schema_version: 1
version: 0.3.0-pilot
title: Seebot Engineering Practice Award
description: Literature-informed points for testing, usability, reproducibility, automation, reuse, and attribution.
maximum_points: 100
minimum_coverage: 0.8
categories:
  testing:
    title: Testing and verification
    maximum_points: 30
    description: Automated tests, fixtures, configuration, and an independently executed acceptance test.
    signals:
      - {id: test_suite, source: repository, key: test_path_present, points: 8}
      - {id: test_configuration, source: repository, key: test_config_present, points: 5}
      - {id: test_data, source: repository, key: test_data_present, points: 5}
      - {id: functional_verification, source: check, check_id: CLI-FUNCTIONAL-001, points: 12}
  documentation:
    title: Documentation and usability
    maximum_points: 25
    description: Project purpose, versioned documentation, examples, change history, and usable command-line help.
    signals:
      - {id: readme, source: repository, key: readme_present, points: 5}
      - {id: documentation_tree, source: repository, key: documentation_path_present, points: 5}
      - {id: examples, source: repository, key: examples_present, points: 5}
      - {id: changelog, source: repository, key: changelog_present, points: 5}
      - {id: help_content, source: check, check_id: CLI-HELP-CONTENT-001, points: 5}
  reproducibility:
    title: Reproducibility and releases
    maximum_points: 20
    description: Declared dependencies, identifiable versions, repeatable interfaces, and reproducible miniature outputs.
    signals:
      - {id: dependency_manifest, source: repository, key: dependency_manifest_present, points: 5}
      - {id: version_identity, source: check, check_id: CLI-VERSION-001, points: 5}
      - {id: repeatable_interface, source: check, check_id: CLI-REPEAT-001, points: 5}
      - {id: repeatable_output, source: check, check_id: CLI-FUNCTIONAL-001, points: 5}
  automation:
    title: Automation and maintenance
    maximum_points: 15
    description: Automated continuous integration and maintained release workflows.
    signals:
      - {id: continuous_integration, source: repository, key: ci_workflow_present, points: 10}
      - {id: release_workflow, source: repository, key: release_automation_present, points: 5}
  reuse_attribution:
    title: Reuse and attribution
    maximum_points: 10
    description: Explicit licensing and machine-readable citation guidance.
    signals:
      - {id: licence, source: repository, key: licence_file_present, points: 7}
      - {id: citation, source: repository, key: citation_metadata_present, points: 3}
tiers:
  - {name: Gold, minimum_points: 85, colour: "#9a6a00"}
  - {name: Silver, minimum_points: 70, colour: "#68717a"}
  - {name: Bronze, minimum_points: 55, colour: "#925f36"}
  - {name: Reviewed, minimum_points: 0, colour: "#50635c"}
scope_note: Literature-informed observable practices; not scientific validation, security certification, or proof of test effectiveness.
