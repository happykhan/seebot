schema_version: 2
frozen: true
frozen_at: '2026-07-15'
snapshot_date: 2026-07-01
historical_snapshot_dates:
  - 2021-07-01
  - 2022-07-01
  - 2023-07-01
  - 2024-07-01
  - 2025-07-01

checks:
  - id: REPO-ACTIVITY-001
    domain: repository
    kind: measurement
    title: Repository activity
    values: [archived, days_since_last_non_bot_commit, commits_last_12_months, active_months_last_12_months]
    exemplar_required: false

  - id: REPO-RELEASES-001
    domain: repository
    kind: measurement
    title: Release activity
    values: [days_since_latest_release, releases_last_24_months, audited_version_ref]
    exemplar_required: false

  - id: REPO-DOCUMENTATION-001
    domain: repository
    kind: measurement
    title: Documentation and reuse information
    values: [readme, installation_instructions, usage_example, licence, citation, documentation, changelog]
    exemplar_required: true

  - id: REPO-STANDARD-TESTS-001
    domain: repository
    kind: measurement
    title: Recognized standard automated tests
    values: [frameworks, recognized_test_files, paths]
    notes: Upstream tests are detected but never executed.
    exemplar_required: true

  - id: REPO-VERIFICATION-CI-001
    domain: repository
    kind: measurement
    title: Verification continuous integration
    values: [verification_workflow_present, workflow_types, latest_state]
    exemplar_required: true

  - id: SRC-INVENTORY-001
    domain: source
    kind: measurement
    title: Production source inventory
    values: [language, files, lines, included_roots, excluded_roots]
    historical: true

  - id: SRC-FILE-LENGTH-001
    domain: source
    kind: measurement
    title: Production source file lengths
    values: [median, percentile_90, maximum, over_500, over_1000, percent_over_500, percent_over_1000]
    historical: true

  - id: SRC-FUNCTION-STRUCTURE-001
    domain: source
    kind: measurement
    title: Function structure
    values: [length_median, length_percentile_90, length_maximum, over_50_lines, over_100_lines, nesting_maximum, over_5_parameters]
    historical: true

  - id: SRC-COMPLEXITY-001
    domain: source
    kind: measurement
    title: Cyclomatic complexity distribution
    values: [median, percentile_90, maximum, over_10, over_20]
    historical: true

  - id: SRC-DUPLICATION-001
    domain: source
    kind: measurement
    title: Duplication indicators
    values: [duplicated_line_percent, duplicated_blocks]
    historical: true

  - id: SRC-DOCUMENTATION-001
    domain: source
    kind: measurement
    title: Language-specific API documentation coverage
    values: [coverage_percent, native_measure]
    historical: true

  - id: SRC-NATIVE-LINT-001
    domain: source
    kind: measurement
    title: Native analyzer findings
    values: [analyzer, rule, native_category, native_severity, count, findings_per_kloc]
    historical: false
    comparison: same language, analyzer, and configuration only

  - id: SRC-NATIVE-SECURITY-001
    domain: source
    kind: measurement
    title: Native source-security indicators
    values: [analyzer, rule, native_severity, native_confidence, count, findings_per_kloc]
    historical: false
    comparison: same language, analyzer, and configuration only

  - id: SRC-DEAD-CODE-001
    domain: source
    kind: measurement
    title: Dead-code candidates
    values: [analyzer, candidate_count]
    historical: false
    notes: Candidates are indicators and are not treated as confirmed dead code.

  - id: DEP-ADVISORY-001
    domain: dependencies
    kind: measurement
    title: Current dependency advisory indicators
    values: [ecosystem, advisory_id, native_severity, dependency, resolved_version]
    historical: false

  - id: CLI-HELP-001
    domain: usage
    kind: contract
    title: Help interface is usable
    timeout_seconds: 15

  - id: CLI-VERSION-001
    domain: usage
    kind: contract
    title: Version interface identifies the audited installation
    timeout_seconds: 15

  - id: CLI-NOARGS-001
    domain: usage
    kind: contract
    title: No-argument behaviour follows the documented interface policy
    timeout_seconds: 15

  - id: CLI-VALID-RUN-001
    domain: usage
    kind: contract
    title: Miniature valid analysis produces structurally valid output
    timeout_seconds: 300
    notes: This does not establish scientific correctness.

  - id: CLI-MISSING-INPUT-001
    domain: robustness
    kind: contract
    title: Missing input is handled gracefully
    timeout_seconds: 30

  - id: CLI-EMPTY-INPUT-001
    domain: robustness
    kind: contract
    title: Zero-byte input is handled gracefully
    timeout_seconds: 30

  - id: CLI-SEMANTICALLY-EMPTY-INPUT-001
    domain: robustness
    kind: contract
    title: Semantically empty input produces a valid empty result
    timeout_seconds: 30
    notes: A format-valid input containing zero biological records must complete without an internal crash and produce structurally valid output representing zero records.

  - id: CLI-MALFORMED-INPUT-001
    domain: robustness
    kind: contract
    title: Malformed expected format is handled gracefully
    timeout_seconds: 30

  - id: CLI-WRONG-FORMAT-001
    domain: robustness
    kind: contract
    title: Valid but wrong biological format is handled gracefully
    timeout_seconds: 30

  - id: CLI-INVALID-OPTION-001
    domain: robustness
    kind: contract
    title: Unrecognized option is handled gracefully
    timeout_seconds: 30

  - id: CLI-INVALID-VALUE-001
    domain: robustness
    kind: contract
    title: Invalid option value is handled gracefully
    timeout_seconds: 30

  - id: CLI-UNWRITABLE-OUTPUT-001
    domain: robustness
    kind: contract
    title: Unwritable output destination is handled gracefully
    timeout_seconds: 30

  - id: CLI-STREAMS-001
    domain: usage
    kind: contract
    title: Documented stdin and stdout modes behave cleanly
    timeout_seconds: 300

public_statuses:
  measurement:
    OBSERVED: Observed
    NOT_OBSERVED: Not observed
    NOT_APPLICABLE: Not applicable
    UNTESTABLE: Could not assess
    ERROR: Audit error
  contract:
    PASS: Handled gracefully
    FAIL: Did not handle gracefully
    NOT_APPLICABLE: Not applicable
    UNTESTABLE: Could not assess
    ERROR: Audit error

exemplars:
  repository_practice:
    require_not_archived: true
    required_observations:
      - readme
      - installation_instructions
      - usage_example
      - licence
      - citation
      - recognized_standard_tests
      - verification_ci
  usage:
    require_all_applicable_contracts: true
  complete_assessment:
    allow: [NOT_APPLICABLE, NOT_EXISTING]
    reject: [UNTESTABLE, ERROR, NOT_RUN]
  practice:
    requires: [repository_practice, usage, complete_assessment]
