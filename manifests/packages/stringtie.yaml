robustness:
  missing_input:
    applicability: applicable
    reason: The alignment input path does not exist.
    command: [stringtie, /fixtures/bad/missing.dat, -o, transcripts.gtf, -p, '1']
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  empty_input:
    applicability: applicable
    reason: A zero-byte alignment input is supplied.
    command: [stringtie, /fixtures/bad/empty.dat, -o, transcripts.gtf, -p, '1']
    fixture_id: bad-empty
    diagnostic_expectation: specific_or_generic
  semantically_empty_input:
    applicability: applicable
    reason: A header-only SAM containing zero alignment records is supplied.
    command: [stringtie, /fixtures/empty/header-only.sam, -o, empty.gtf, -p, '1']
    fixture_id: empty-header-only-sam
    expected_outputs:
    - {path: empty.gtf, nonempty: false, parser: null, record_count: null}
    expect_stdout: false
    stdout_parser: null
    stdout_record_count: null
  malformed_input:
    applicability: applicable
    reason: Plain text is supplied where an alignment is expected.
    command: [stringtie, /fixtures/bad/plain-text.dat, -o, transcripts.gtf, -p, '1']
    fixture_id: bad-plain-text
    diagnostic_expectation: specific_or_generic
  wrong_format:
    applicability: applicable
    reason: A valid VCF is supplied where an alignment is expected.
    command: [stringtie, /fixtures/core/variants.vcf, -o, transcripts.gtf, -p, '1']
    fixture_id: core-variants-vcf
    diagnostic_expectation: specific_or_generic
  invalid_option:
    applicability: applicable
    reason: The option is deliberately unrecognised.
    command: [stringtie, /fixtures/core/alignment.sam, --seebot-invalid-option, -o, transcripts.gtf]
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  invalid_value:
    applicability: applicable
    reason: The thread count is given a deliberately non-integer value.
    command: [stringtie, /fixtures/core/alignment.sam, -p, not-an-integer, -o, transcripts.gtf]
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  unwritable_output:
    applicability: applicable
    reason: The transcript output is placed on the read-only fixture mount.
    command: [stringtie, /fixtures/core/alignment.sam, -o, /fixtures/transcripts.gtf, -p, '1']
    fixture_id: null
    diagnostic_expectation: specific_or_generic
