robustness:
  missing_input:
    applicability: applicable
    reason: One paired-read path is missing while the other mate remains valid.
    command: [unicycler, '-1', /fixtures/bad/missing.dat, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, '1', --kmers, '21']
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  empty_input:
    applicability: applicable
    reason: One paired-read path is zero bytes while the other mate remains valid.
    command: [unicycler, '-1', /fixtures/bad/empty.dat, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, '1', --kmers, '21']
    fixture_id: bad-empty
    diagnostic_expectation: specific_or_generic
  semantically_empty_input:
    applicability: applicable
    reason: Two format-valid FASTQ streams containing zero reads are supplied.
    command: [unicycler, '-1', /fixtures/empty/empty.fastq, '-2', /fixtures/empty/empty.fastq,
      -o, empty-out, --threads, '1', --kmers, '21']
    fixture_id: empty-fastq
    expected_outputs:
    - {path: empty-out/assembly.fasta, nonempty: false, parser: fasta, record_count: 0}
    expect_stdout: false
    stdout_parser: null
    stdout_record_count: null
  malformed_input:
    applicability: applicable
    reason: A truncated FASTQ is supplied for one mate while the other remains valid.
    command: [unicycler, '-1', /fixtures/bad/truncated.fastq, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, '1', --kmers, '21']
    fixture_id: bad-truncated-fastq
    diagnostic_expectation: specific_or_generic
  wrong_format:
    applicability: applicable
    reason: A valid VCF is supplied in place of one paired FASTQ input.
    command: [unicycler, '-1', /fixtures/core/variants.vcf, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, '1', --kmers, '21']
    fixture_id: core-variants-vcf
    diagnostic_expectation: specific_or_generic
  invalid_option:
    applicability: applicable
    reason: The option is deliberately unrecognised on an otherwise complete assembly command.
    command: [unicycler, '-1', /fixtures/core/reads_R1.fastq, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, '1', --kmers, '21', --seebot-invalid-option]
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  invalid_value:
    applicability: applicable
    reason: The thread count is given a deliberately non-integer value.
    command: [unicycler, '-1', /fixtures/core/reads_R1.fastq, '-2', /fixtures/core/reads_R2.fastq,
      -o, unicycler-out, --threads, none, --kmers, '21']
