    - /fixtures/bad/missing.fasta
    - out.fasta
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  empty_input:
    applicability: applicable
    reason: A zero-byte sequence file is supplied.
    command:
    - famsa
    - /fixtures/bad/empty.dat
    - out.fasta
    fixture_id: bad-empty
    diagnostic_expectation: specific_or_generic
  semantically_empty_input:
    applicability: applicable
    reason: A valid FASTA stream containing zero sequence records is supplied.
    command:
    - famsa
    - -t
    - '1'
    - /fixtures/empty/empty.fasta
    - empty.fasta
    fixture_id: empty-fasta
    expected_outputs:
    - path: empty.fasta
      nonempty: false
      parser: fasta
      record_count: 0
    expect_stdout: false
    stdout_parser: null
    stdout_record_count: null
  malformed_input:
    applicability: applicable
    reason: The FASTA structure is malformed.
    command:
    - famsa
    - /fixtures/bad/malformed.fasta
    - out.fasta
    fixture_id: bad-malformed-fasta
    diagnostic_expectation: specific_or_generic
  wrong_format:
    applicability: applicable
    reason: A valid VCF is supplied instead of FASTA.
    command:
    - famsa
    - /fixtures/core/variants.vcf
    - out.fasta
    fixture_id: core-variants-vcf
    diagnostic_expectation: specific_or_generic
  invalid_option:
    applicability: applicable
    reason: The option is deliberately unrecognised.
    command:
    - famsa
    - -seebot-invalid-option
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  invalid_value:
    applicability: applicable
    reason: The thread-count value is deliberately invalid.
    command:
    - famsa
    - -t
    - not-an-integer
    - /fixtures/core/alignment.fasta
    - out.fasta
    fixture_id: core-alignment-fasta
    diagnostic_expectation: specific_or_generic
  unwritable_output:
    applicability: applicable
    reason: The fixture mount is read-only.
    command:
    - famsa
    - /fixtures/core/alignment.fasta
    - /fixtures/forbidden.fasta
