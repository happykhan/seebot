robustness:
  missing_input:
    applicability: applicable
    reason: A FASTA input path is required when -i is used.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/bad/missing.fasta
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  empty_input:
    applicability: applicable
    reason: A zero-byte FASTA is supplied.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/bad/empty.dat
    fixture_id: bad-empty
    diagnostic_expectation: specific_or_generic
  semantically_empty_input:
    applicability: applicable
    reason: A valid FASTA stream containing zero sequence records is supplied.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/empty/empty.fasta
    - -o
    - empty.gff
    fixture_id: empty-fasta
    expected_outputs:
    - path: empty.gff
