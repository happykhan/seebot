      parser: gff3
      record_count: 0
    expect_stdout: false
    stdout_parser: null
    stdout_record_count: null
  malformed_input:
    applicability: applicable
    reason: The FASTA structure is malformed.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/bad/malformed.fasta
    fixture_id: bad-malformed-fasta
    diagnostic_expectation: specific_or_generic
  wrong_format:
    applicability: applicable
    reason: A valid FASTQ is supplied instead of FASTA.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/core/reads_R1.fastq
    fixture_id: core-reads-r1-fastq
    diagnostic_expectation: specific_or_generic
  invalid_option:
    applicability: applicable
    reason: The option is deliberately unrecognised.
    command:
    - pyrodigal
    - --seebot-invalid-option
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  invalid_value:
    applicability: applicable
    reason: The job-count value is deliberately invalid.
    command:
    - pyrodigal
    - --jobs
    - not-an-integer
    - -p
    - meta
    - -i
    - /fixtures/pyrodigal/genes.fasta
    fixture_id: pyrodigal-synthetic-orf
    diagnostic_expectation: specific_or_generic
  unwritable_output:
    applicability: applicable
    reason: The fixture mount is read-only.
    command:
    - pyrodigal
    - -p
    - meta
    - -i
    - /fixtures/pyrodigal/genes.fasta
