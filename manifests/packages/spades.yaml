robustness:
  missing_input:
    applicability: applicable
    reason: One paired-read path does not exist while its mate remains valid.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/bad/missing.dat, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, '1', -m, '1', -o, spades-out]
    fixture_id: null
    diagnostic_expectation: specific_or_generic
  empty_input:
    applicability: applicable
    reason: A zero-byte file is supplied for one mate while the other remains valid.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/bad/empty.dat, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, '1', -m, '1', -o, spades-out]
    fixture_id: bad-empty
    diagnostic_expectation: specific_or_generic
  semantically_empty_input:
    applicability: applicable
    reason: Format-valid paired FASTQ streams containing zero reads are supplied.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/empty/empty.fastq, '-2', /fixtures/empty/empty.fastq, -k, '15', -t, '1', -m, '1', -o, empty-out]
