    expected_outputs:
    - {path: empty-out/contigs.fasta, nonempty: false, parser: fasta, record_count: 0}
    expect_stdout: false
    stdout_parser: null
    stdout_record_count: null
  malformed_input:
    applicability: applicable
    reason: A truncated FASTQ is supplied for one mate while the other remains valid.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/bad/truncated.fastq, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, '1', -m, '1', -o, spades-out]
    fixture_id: bad-truncated-fastq
    diagnostic_expectation: specific_or_generic
  wrong_format:
    applicability: applicable
    reason: A valid VCF is supplied in place of one paired FASTQ input.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/core/variants.vcf, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, '1', -m, '1', -o, spades-out]
    fixture_id: core-variants-vcf
    diagnostic_expectation: specific_or_generic
  invalid_option:
    applicability: applicable
    reason: The option is deliberately unrecognised.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/core/reads_R1.fastq, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, '1', -m, '1', -o, spades-out, --seebot-invalid-option]
