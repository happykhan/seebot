    diagnostic_expectation: specific_or_generic
  invalid_value:
    applicability: applicable
    reason: The thread count is given a deliberately non-integer value.
    command: [spades.py, --isolate, --only-assembler, '-1', /fixtures/core/reads_R1.fastq, '-2', /fixtures/core/reads_R2.fastq, -k, '15', -t, none, -m, '1', -o, spades-out]
    fixture_id: null
