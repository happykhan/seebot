name: schemas
on:
  push:
    paths: ['schemas/**', 'manifests/**', 'config/**', 'src/bioconda_audit/manifests.py']
  pull_request:
    paths: ['schemas/**', 'manifests/**', 'config/**', 'src/bioconda_audit/manifests.py']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run bcqa manifest validate-all

